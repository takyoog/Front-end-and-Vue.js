<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика 4</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="app">
        <div class="converter-container">
            <h1>Автоматическая конвертация скорости <br> км/ч <—> м/с</h1>
            
            <div class="input-group">
                <label for="kmh">Скорость в километрах в час (км/ч):</label>
                <input 
                    type="number" 
                    id="kmh" 
                    v-model="kmh" 
                    placeholder="Введите скорость в км/ч"
                >
            </div>

            <div class="input-group">
                <label for="ms">Скорость в метрах в секунду (м/с):</label>
                <input 
                    type="number" 
                    id="ms" 
                    v-model="ms" 
                    placeholder="Введите скорость в м/с"
                >
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
